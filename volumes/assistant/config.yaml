# volumes/assistant/config.yaml
# Конфигурация умной колонки

# Параметры аудио
audio:
#  device: "default"
#  input_device: "hw:2,0"    # Микрофон (card 2, device 0)
#  output_device: "hw:3,0"   # Колонка (card 3, device 0)
  input_device: 2           # card 2 (microphone)
  output_device: 3          # card 3 (USB колонка)
  sample_rate: 48000
  channels: 1
#  channels: 2               # ИЗМЕНИ на 2 (stereo) для USB
  duration_wakeword: 2
  duration_command: 3
  silence_threshold: 0.01   #вроде нигде не используется

# Модели AI
models:
  wake_word: "ok_nabu"   #"salut"   #"ok_nabu"
  whisper: "base"
  whisper_language: "ru"
  ollama: "qwen2.5:1.5b"

# URLs сервисов
services:
  whisper_url: "http://whisper:8200/inference"
  ollama_url: "http://ollama:11434/api/generate"
  piper_url: "http://piper:5000/?text="

# Параметры работы
runtime:
  test_mode: false
  wake_word_threshold: 0.04
  wake_word_mode: "volume"  # "volume" или "openwakeword"


# Настройки хранения аудио
storage:
  audio_output_dir: "/app/audio"
  max_audio_size_mb: 50
  max_audio_files: 10

# Системные
system:
  llm_system_prompt: "Вы — помощник умной колонки. Отвечайте кратко, на русском, максимум 20 слов."

# === БЛОК JAMENDO (заполни своими данными) ===
jamendo:
  client_id: "YOUR_CLIENT_ID_HERE"  # Твой client_id от devportal.jamendo.com
  radio_id: "radio_1"                # Или: "radio_pop", "radio_rock", "radio_electronic"
  stream_format: "ogg"               # Формат: "ogg" или "mp3"

# === БЛОК МУЗЫКАЛЬНЙ БИБЛИОТЕКИ (NAS) ===
music_server:
  ip: "192.168.1.171"            # IP твоего NAS
  path: "/музыка"                # Путь к папке с музыкой (без сервера, только путь)
  # Для Windows SMB: используйте формат \\NAS\музыка или /NAS/музыка
  # Для Linux NFS: /mnt/music или /media/music
  username: ""                   # Если нужен доступ (опционально)
  password: ""                   # Если нужен доступ (опционально)

# === БЛОК ГРОМКОСТИ ===
volume:
  step: 15                       # Шаг громкости в процентах (15%)
  device: "default"              # Аудиоустройство (можно оставить "default")

# === БЛОК КАМЕРЫ ===
camera:
#  mode: face 
#  mode: yolo
  mode: face_recognition

  width: 1280
  height: 720
  timeout_ms: 200
  output_dir: /app/audio/camera

  face_cascade: haarcascade_frontalface_default.xml
  face_label: face
  face_min_size: [40, 40]
  face_scale_factor: 1.1
  face_min_neighbors: 5

  yolo_model: yolov8n.pt
  yolo_imgsz: 640
  yolo_conf: 0.35
  yolo_iou: 0.45
  yolo_device: cpu

  face_recognition_target: /app/targets/target.jpg
  face_recognition_tolerance: 0.45
  face_recognition_model: hog
  face_recognition_label: target_match


# === ПЛАН-ПЛАН БЛОК ПОГОДЫ (заполни API погоды) ===
weather:
  api_url: "https://api.weather.com"   # API погоды (например, OpenWeatherMap)
  api_key: "YOUR_WEATHER_API_KEY"      # Твой API ключ
  city: "Moscow"                       # Город для погоды

# === ПЛАН-ПЛАН БЛОК НАПОМИНАНЙ (можно использовать локальное или внешнее) ===
#  storage_file: "/tmp/reminders.json"  # Файл для хранения напоминаний
  # Или внешнее API:
  # api_url: "http reminder-api:8080"
reminders:
  db_path: "/data/assistdata.db"        # единая база для разных сервисов
  check_interval_seconds: 30
  max_time_parse_attempts: 2
  timezone: "Europe/Moscow"
  dateparser:
    prefer_dates_from: "future"

# === ПЛАН-ПЛАН  БЛОК ПЫЛЕСОСА (твой текущий) ===
vacuum:
#  api_url: "http://vacuum-api:8080"
#  start_endpoint: "/start"
#  stop_endpoint: "/stop"
  enabled: true
  provider: "python-miio"
  model: "roborock.vacuum.v1"
  ip: "192.168.1.181"
  token: "5a516f6c5a784d694a6d4c39734e4274"   # token устройства
  discover:
    enabled: true
    provider: "miio"
    container: "miio-tool"
    sync: true
    timeout_sec: 180

# === ПЛАН-ОСТАНОВЛЕНО БЛОК СЕРВОПРИВОДА ===
servo:
  pin: 17              # GPIO17 (пин №11)
  min_angle: 0         # Минимальный угол (градусы)
  max_angle: 180       # Максимальный угол (градусы)
  min_duty: 2.5        # Минимальный duty cycle для твоего SG-90
  max_duty: 10.0       # Максимальный duty cycle для твоего SG-90
  pwm_frequency: 50    # PWM частота (Гц)
  move_delay: 0.3      # Время ожидания после движения (сек)
